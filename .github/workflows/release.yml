name: Create Release

on:
  workflow_dispatch:
    inputs:
      dry_run:
        description: 'Dry run (no actual release)'
        required: false
        default: false
        type: boolean
      draft:
        description: 'Create as draft release (tag created, GH release is draft)'
        required: false
        default: true
        type: boolean

permissions:
  contents: write
  packages: write
  issues: write
  pull-requests: write
  actions: read

env:
  NODE_VERSION: '25'

jobs:
  # Job 1: Determine if there's a release and get the version
  prepare-release:
    name: Prepare Release
    runs-on: ubuntu-latest
    outputs:
      new_release: ${{ steps.semantic.outputs.new_release_published }}
      new_version: ${{ steps.semantic.outputs.new_release_version }}
      new_tag: ${{ steps.semantic.outputs.new_release_git_tag }}
      build_number: ${{ steps.build-number.outputs.build_number }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          persist-credentials: true

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Generate GitHub App token
        id: generate-token
        uses: actions/create-github-app-token@v1
        with:
          app-id: ${{ secrets.APP_ID }}
          private-key: ${{ secrets.APP_PRIVATE_KEY }}

      - name: Configure draft release
        if: inputs.draft == true
        run: |
          # Update .releaserc.json to create draft release
          node -e "
            const fs = require('fs');
            const config = JSON.parse(fs.readFileSync('.releaserc.json', 'utf8'));
            // Find and update @semantic-release/github plugin
            config.plugins = config.plugins.map(plugin => {
              if (Array.isArray(plugin) && plugin[0] === '@semantic-release/github') {
                plugin[1] = { ...plugin[1], draftRelease: true };
              } else if (plugin === '@semantic-release/github') {
                return ['@semantic-release/github', { draftRelease: true }];
              }
              return plugin;
            });
            fs.writeFileSync('.releaserc.json', JSON.stringify(config, null, 2));
            console.log('Updated .releaserc.json for draft release');
          "

      - name: Get build number
        id: build-number
        uses: ./.github/actions/get-build-number
        with:
          redis_url: ${{ secrets.UPSTASH_REDIS_REST_URL }}
          redis_token: ${{ secrets.UPSTASH_REDIS_REST_TOKEN }}

      - name: Run semantic-release
        id: semantic
        uses: cycjimmy/semantic-release-action@v4
        with:
          dry_run: ${{ inputs.dry_run }}
          extra_plugins: |
            @semantic-release/changelog
            @semantic-release/exec
            @semantic-release/git
        env:
          GITHUB_TOKEN: ${{ steps.generate-token.outputs.token }}

      - name: Release summary
        run: |
          echo "## Semantic Release Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          if [ "${{ steps.semantic.outputs.new_release_published }}" = "true" ]; then
            echo "New release: **v${{ steps.semantic.outputs.new_release_version }}**" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "Tag: \`${{ steps.semantic.outputs.new_release_git_tag }}\`" >> $GITHUB_STEP_SUMMARY
          else
            echo "No new release needed based on commits." >> $GITHUB_STEP_SUMMARY
          fi
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "Dry run: ${{ inputs.dry_run }}" >> $GITHUB_STEP_SUMMARY
          echo "Draft: ${{ inputs.draft }}" >> $GITHUB_STEP_SUMMARY

  # Job 2: Notify Sentry of new build/release
  notify-sentry:
    name: Notify Sentry
    needs: prepare-release
    if: needs.prepare-release.outputs.new_release == 'true' && inputs.dry_run == false
    runs-on: ubuntu-latest
    steps:
      - name: Notify Sentry (build)
        continue-on-error: true
        run: |
          curl "${{ secrets.SENTRY_RELEASE_WEBHOOK_URL }}" \
            -X POST \
            -H 'Content-Type: application/json' \
            -d '{"version": "${{ needs.prepare-release.outputs.build_number }}"}'

      - name: Notify Sentry (version)
        continue-on-error: true
        run: |
          curl "${{ secrets.SENTRY_RELEASE_WEBHOOK_URL }}" \
            -X POST \
            -H 'Content-Type: application/json' \
            -d '{"version": "${{ needs.prepare-release.outputs.new_version }}"}'

  # Job 3: Run mod semantic-release (patches gradle.properties, BDS files, creates mods-v tag + GH release)
  prepare-mods-release:
    name: Prepare Mods Release
    needs: [prepare-release, build-server]
    if: needs.prepare-release.outputs.new_release == 'true' && needs.build-server.result == 'success'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: write
    outputs:
      new_release_published: ${{ steps.semantic-release.outputs.new_release_published }}
      new_release_version: ${{ steps.semantic-release.outputs.new_release_version }}
      new_release_git_tag: ${{ steps.semantic-release.outputs.new_release_git_tag }}
      new_release_notes: ${{ steps.semantic-release.outputs.new_release_notes }}
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          show-progress: false
          ref: ${{ github.ref }}

      - name: Fetch all tags
        run: git fetch --tags --force

      - name: Semantic Release
        id: semantic-release
        uses: cycjimmy/semantic-release-action@v4
        with:
          working_directory: ./mods/java
          dry_run: ${{ inputs.dry_run }}
          extra_plugins: |
            @semantic-release/changelog
            @semantic-release/exec
            @semantic-release/git
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Summary
        if: ${{ steps.semantic-release.outputs.new_release_published }}
        run: |
          {
              echo "## Mods Release ${{ steps.semantic-release.outputs.new_release_version }}"
              echo ""
              echo "| Name | Value |"
              echo "| ---- | ----- |"
              echo "| Release | [${{ steps.semantic-release.outputs.new_release_version }}](${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}/releases/tag/${{ steps.semantic-release.outputs.new_release_git_tag }}) |"
              echo "| Release Type | ${{ github.ref_name == 'beta' && 'beta' || 'release' }} |"
              echo "| Old Version | [${{ steps.semantic-release.outputs.last_release_git_tag }}](${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}/releases/tag/${{ steps.semantic-release.outputs.last_release_git_tag }}) |"
              echo "| Diff | [${{ steps.semantic-release.outputs.last_release_git_tag }}...${{ steps.semantic-release.outputs.new_release_git_tag }}](${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}/compare/${{ steps.semantic-release.outputs.last_release_git_tag }}...${{ steps.semantic-release.outputs.new_release_git_tag }}) |"
              echo "| Dry Run | ${{ inputs.dry_run && 'Yes' || 'No' }} |"
              echo ""
              echo "> **Note:** Links to the new version will only work after the release is created"
          } >> $GITHUB_STEP_SUMMARY

  # Job 4: Build server (release mode, Docker push gated by approve-publish)
  build-server:
    name: Build Server (release)
    needs: prepare-release
    if: needs.prepare-release.outputs.new_release == 'true'
    uses: ./.github/workflows/build-server.yml
    with:
      build_mode: release
      ref: ${{ inputs.dry_run && github.ref || needs.prepare-release.outputs.new_tag }}
    secrets: inherit

  # Job 4: Build Android (release mode, includes signing)
  build-android:
    name: Build Android (release)
    needs: prepare-release
    if: needs.prepare-release.outputs.new_release == 'true'
    uses: ./.github/workflows/build-android.yml
    with:
      build_mode: release
      ref: ${{ inputs.dry_run && github.ref || needs.prepare-release.outputs.new_tag }}
      version: ${{ needs.prepare-release.outputs.new_version }}
      build_number: ${{ needs.prepare-release.outputs.build_number }}
      play_store_track: ${{ !inputs.dry_run && (github.ref == 'refs/heads/beta' && 'Beta Early Access' || 'production') || '' }}
    secrets: inherit

  # Job 5: Build iOS client (release mode, signed + TestFlight upload)
  build-ios:
    name: Build iOS (release)
    needs: prepare-release
    if: needs.prepare-release.outputs.new_release == 'true'
    uses: ./.github/workflows/build-ios.yml
    with:
      build_mode: release
      ref: ${{ inputs.dry_run && github.ref || needs.prepare-release.outputs.new_tag }}
      version: ${{ needs.prepare-release.outputs.new_version }}
      build_number: ${{ needs.prepare-release.outputs.build_number }}
      testflight_upload: ${{ !inputs.dry_run }}
    secrets: inherit

  # Job 6: Build Windows client (release mode)
  build-client:
    name: Build Windows (release)
    needs: prepare-release
    if: needs.prepare-release.outputs.new_release == 'true'
    uses: ./.github/workflows/build-client.yml
    with:
      build_mode: release
      ref: ${{ inputs.dry_run && github.ref || needs.prepare-release.outputs.new_tag }}
      version: ${{ needs.prepare-release.outputs.new_version }}
    secrets: inherit

  # Job 6: Build macOS client (release mode, signed + TestFlight upload)
  build-macos-client:
    name: Build macOS (release)
    needs: prepare-release
    if: needs.prepare-release.outputs.new_release == 'true'
    uses: ./.github/workflows/build-macos-client.yml
    with:
      build_mode: release
      ref: ${{ inputs.dry_run && github.ref || needs.prepare-release.outputs.new_tag }}
      version: ${{ needs.prepare-release.outputs.new_version }}
      build_number: ${{ needs.prepare-release.outputs.build_number }}
      testflight_upload: ${{ !inputs.dry_run }}
    secrets: inherit

  # Job 8: Build Fabric Mod
  build-mod-fabric:
    name: Build Fabric Mod
    needs: prepare-mods-release
    if: needs.prepare-mods-release.outputs.new_release_published == 'true'
    uses: ./.github/workflows/build-mod-fabric.yml
    with:
      version: ${{ needs.prepare-mods-release.outputs.new_release_version }}
      artifact_run_id: ${{ github.run_id }}
    secrets: inherit

  # Job 9: Build Paper Plugin
  build-mod-paper:
    name: Build Paper Plugin
    needs: prepare-mods-release
    if: needs.prepare-mods-release.outputs.new_release_published == 'true'
    uses: ./.github/workflows/build-mod-paper.yml
    with:
      version: ${{ needs.prepare-mods-release.outputs.new_release_version }}
      artifact_run_id: ${{ github.run_id }}
    secrets: inherit

  # Job 10: Build Hytale Plugin
  build-mod-hytale:
    name: Build Hytale Plugin
    needs: prepare-mods-release
    if: needs.prepare-mods-release.outputs.new_release_published == 'true'
    uses: ./.github/workflows/build-mod-hytale.yml
    with:
      version: ${{ needs.prepare-mods-release.outputs.new_release_version }}
      artifact_run_id: ${{ github.run_id }}
    secrets: inherit

  # Job 11: Build BDS Pack
  build-mod-bds:
    name: Build BDS Pack
    needs: prepare-mods-release
    if: needs.prepare-mods-release.outputs.new_release_published == 'true'
    uses: ./.github/workflows/build-mod-bds.yml
    with:
      version: ${{ needs.prepare-mods-release.outputs.new_release_version }}
    secrets: inherit

  # Job 12: Upload client/server release assets to GitHub
  upload-assets:
    name: Upload Release Assets
    needs: [prepare-release, build-server, build-android, build-ios, build-client, build-macos-client]
    if: always() && needs.prepare-release.outputs.new_release == 'true' && inputs.dry_run == false && (needs.build-server.result == 'success' || needs.build-android.result == 'success' || needs.build-ios.result == 'success' || needs.build-client.result == 'success' || needs.build-macos-client.result == 'success')
    runs-on: ubuntu-latest
    steps:
      - name: Generate GitHub App token
        id: generate-token
        uses: actions/create-github-app-token@v1
        with:
          app-id: ${{ secrets.APP_ID }}
          private-key: ${{ secrets.APP_PRIVATE_KEY }}

      - name: Download release artifacts
        uses: actions/download-artifact@v4
        with:
          path: ./artifacts
          pattern: bvc-*
          merge-multiple: false

      - name: List all artifacts
        run: |
          echo "=== All downloaded artifacts ==="
          find ./artifacts -type f -ls

      - name: Prepare release files
        run: |
          mkdir -p release-files
          VERSION="${{ needs.prepare-release.outputs.new_version }}"

          # Server binaries
          if [ -f "./artifacts/bvc-server-x86_64-pc-windows-msvc-release/bvc-server-x86_64-pc-windows-msvc-release.exe" ]; then
            cp "./artifacts/bvc-server-x86_64-pc-windows-msvc-release/bvc-server-x86_64-pc-windows-msvc-release.exe" ./release-files/bvc-server-windows-x64.exe
          fi

          if [ -f ./artifacts/bvc-server-x86_64-unknown-linux-musl-release/bvc-server-x86_64-unknown-linux-musl-release ]; then
            cp ./artifacts/bvc-server-x86_64-unknown-linux-musl-release/bvc-server-x86_64-unknown-linux-musl-release ./release-files/bvc-server-linux-x64
          fi

          if [ -f ./artifacts/bvc-server-aarch64-unknown-linux-musl-release/bvc-server-aarch64-unknown-linux-musl-release ]; then
            cp ./artifacts/bvc-server-aarch64-unknown-linux-musl-release/bvc-server-aarch64-unknown-linux-musl-release ./release-files/bvc-server-linux-arm64
          fi

          # Windows client
          if [ -f "./artifacts/bvc-windows-release/bvc-windows-release.exe" ]; then
            cp "./artifacts/bvc-windows-release/bvc-windows-release.exe" ./release-files/bvc-client-windows-x64.exe
          fi

          # Signed Android artifacts (from build-android.yml)
          if [ -f "./artifacts/bvc-android-release-signed-apk/bvc-android-release-signed.apk" ]; then
            cp "./artifacts/bvc-android-release-signed-apk/bvc-android-release-signed.apk" ./release-files/bvc-android-${VERSION}.apk
          fi

          # iOS signed IPA
          if [ -f "./artifacts/bvc-ios-release-signed-ipa/bvc-ios-release.ipa" ]; then
            cp "./artifacts/bvc-ios-release-signed-ipa/bvc-ios-release.ipa" ./release-files/bvc-ios-${VERSION}.ipa
          fi

          # macOS client (.app.zip for direct download)
          if [ -f "./artifacts/bvc-macos-release/bvc-macos-release.app.zip" ]; then
            cp "./artifacts/bvc-macos-release/bvc-macos-release.app.zip" ./release-files/bvc-client-macos-arm64.app.zip
          fi

          # macOS signed pkg (for App Store / TestFlight)
          if [ -f "./artifacts/bvc-macos-release-signed-pkg/bvc-macos-release.pkg" ]; then
            cp "./artifacts/bvc-macos-release-signed-pkg/bvc-macos-release.pkg" ./release-files/bvc-macos-${VERSION}.pkg
          fi

          # macOS updater bundle + signature (for auto-updater)
          if [ -f "./artifacts/bvc-macos-updater/bvc-macos-updater.app.tar.gz" ]; then
            cp "./artifacts/bvc-macos-updater/bvc-macos-updater.app.tar.gz" ./release-files/bvc-client-macos-arm64-updater.app.tar.gz
          fi
          if [ -f "./artifacts/bvc-macos-updater/bvc-macos-updater.app.tar.gz.sig" ]; then
            cp "./artifacts/bvc-macos-updater/bvc-macos-updater.app.tar.gz.sig" ./release-files/bvc-client-macos-arm64-updater.app.tar.gz.sig
          fi

          # Windows NSIS installer (for manual download)
          if [ -f "./artifacts/bvc-windows-nsis-setup/bvc-windows-nsis-setup.exe" ]; then
            cp "./artifacts/bvc-windows-nsis-setup/bvc-windows-nsis-setup.exe" ./release-files/bvc-client-windows-x64-setup.exe
          fi

          # Windows updater bundle + signature (for auto-updater)
          if [ -f "./artifacts/bvc-windows-updater/bvc-windows-updater.nsis.zip" ]; then
            cp "./artifacts/bvc-windows-updater/bvc-windows-updater.nsis.zip" ./release-files/bvc-client-windows-x64-updater.nsis.zip
          fi
          if [ -f "./artifacts/bvc-windows-updater/bvc-windows-updater.nsis.zip.sig" ]; then
            cp "./artifacts/bvc-windows-updater/bvc-windows-updater.nsis.zip.sig" ./release-files/bvc-client-windows-x64-updater.nsis.zip.sig
          fi

          echo "=== Release files prepared ==="
          ls -la ./release-files/

      - name: Upload assets to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ needs.prepare-release.outputs.new_version }}
          files: ./release-files/*
          draft: ${{ inputs.draft }}
          prerelease: ${{ contains(needs.prepare-release.outputs.new_version, '-') }}
        env:
          GITHUB_TOKEN: ${{ steps.generate-token.outputs.token }}

      - name: Release summary
        run: |
          VERSION="${{ needs.prepare-release.outputs.new_version }}"
          echo "## Release Assets Uploaded" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "Version: **v${VERSION}**" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Uploaded Files" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          for file in ./release-files/*; do
            if [ -f "$file" ]; then
              echo "- \`$(basename $file)\`" >> $GITHUB_STEP_SUMMARY
            fi
          done

  # Gate: Approval required before publishing to external services
  approve-publish:
    name: Approve Release Publish
    needs: [prepare-release, upload-assets, upload-mod-release-assets]
    if: always() && needs.prepare-release.outputs.new_release == 'true' && inputs.dry_run == false && needs.upload-assets.result == 'success'
    runs-on: ubuntu-latest
    environment: release
    steps:
      - name: Approve
        run: echo "Release publish approved for v${{ needs.prepare-release.outputs.new_version }}"

  # Job 13: Publish Fabric to Modrinth
  publish-modrinth-fabric:
    name: Publish Fabric to Modrinth
    needs: [prepare-mods-release, build-mod-fabric, approve-publish]
    if: needs.approve-publish.result == 'success' && needs.prepare-mods-release.outputs.new_release_published == 'true' && needs.build-mod-fabric.result == 'success'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read
    steps:
      - name: Download artifact
        uses: actions/download-artifact@v4
        with:
          name: bedrock-voice-chat-fabric-${{ needs.prepare-mods-release.outputs.new_release_version }}
          path: ./artifacts

      - name: List artifacts
        run: ls -la ./artifacts

      - name: Publish to Modrinth
        uses: cloudnode-pro/modrinth-publish@v2
        with:
          token: ${{ secrets.MODRITH_PAT }}
          project: ${{ secrets.MODRITH_ID }}
          files: ./artifacts/bedrock-voice-chat-${{ needs.prepare-mods-release.outputs.new_release_version }}.jar
          primary-file: bedrock-voice-chat-${{ needs.prepare-mods-release.outputs.new_release_version }}.jar
          version: ${{ needs.prepare-mods-release.outputs.new_release_version }}
          name: Bedrock Voice Chat ${{ needs.prepare-mods-release.outputs.new_release_version }} (Fabric)
          changelog: ${{ needs.prepare-mods-release.outputs.new_release_notes }}
          dependencies: |-
            [{
              "project_id": "P7dR8mSH",
              "dependency_type": "required"
            }]
          loaders: |-
            fabric
          game-versions: |-
            1.21.11
          channel: ${{ github.ref_name == 'beta' && 'beta' || 'release' }}

  # Job 14: Publish Paper to Modrinth
  publish-modrinth-paper:
    name: Publish Paper to Modrinth
    needs: [prepare-mods-release, build-mod-paper, approve-publish]
    if: needs.approve-publish.result == 'success' && needs.prepare-mods-release.outputs.new_release_published == 'true' && needs.build-mod-paper.result == 'success'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read
    steps:
      - name: Download artifact
        uses: actions/download-artifact@v4
        with:
          name: bedrock-voice-chat-paper-${{ needs.prepare-mods-release.outputs.new_release_version }}
          path: ./artifacts

      - name: List artifacts
        run: ls -la ./artifacts

      - name: Publish to Modrinth
        uses: cloudnode-pro/modrinth-publish@v2
        with:
          token: ${{ secrets.MODRITH_PAT }}
          project: ${{ secrets.MODRITH_ID }}
          files: ./artifacts/bedrock-voice-chat-paper-${{ needs.prepare-mods-release.outputs.new_release_version }}.jar
          primary-file: bedrock-voice-chat-paper-${{ needs.prepare-mods-release.outputs.new_release_version }}.jar
          version: ${{ needs.prepare-mods-release.outputs.new_release_version }}-paper
          name: Bedrock Voice Chat ${{ needs.prepare-mods-release.outputs.new_release_version }} (Paper)
          changelog: ${{ needs.prepare-mods-release.outputs.new_release_notes }}
          loaders: |-
            paper
            spigot
            bukkit
          game-versions: |-
            1.21.11
          channel: ${{ github.ref_name == 'beta' && 'beta' || 'release' }}

  # Job 15: Publish Hytale to CurseForge
  publish-curseforge-hytale:
    name: Publish Hytale to CurseForge
    needs: [prepare-mods-release, build-mod-hytale, approve-publish]
    if: needs.approve-publish.result == 'success' && needs.prepare-mods-release.outputs.new_release_published == 'true' && needs.build-mod-hytale.result == 'success'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read
    steps:
      - name: Download artifact
        uses: actions/download-artifact@v4
        with:
          name: bedrock-voice-chat-hytale-${{ needs.prepare-mods-release.outputs.new_release_version }}
          path: ./artifacts

      - name: List artifacts
        run: ls -la ./artifacts

      - name: Publish to CurseForge
        uses: itsmeow/curseforge-upload@v3
        with:
          token: ${{ secrets.CURSEFORGE_API_TOKEN }}
          project_id: 1445994
          game_endpoint: minecraft
          file_path: ./artifacts/bedrock-voice-chat-hytale-${{ needs.prepare-mods-release.outputs.new_release_version }}.jar
          changelog: ${{ needs.prepare-mods-release.outputs.new_release_notes }}
          changelog_type: markdown
          display_name: Bedrock Voice Chat ${{ needs.prepare-mods-release.outputs.new_release_version }}
          release_type: ${{ github.ref_name == 'beta' && 'beta' || 'release' }}

  # Job 16: Publish BDS to CurseForge
  publish-curseforge-bds:
    name: Publish BDS to CurseForge
    needs: [prepare-mods-release, build-mod-bds, approve-publish]
    if: needs.approve-publish.result == 'success' && needs.prepare-mods-release.outputs.new_release_published == 'true' && needs.build-mod-bds.result == 'success'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read
    steps:
      - name: Download artifact
        uses: actions/download-artifact@v4
        with:
          name: bedrock-voice-chat-bds-${{ needs.prepare-mods-release.outputs.new_release_version }}
          path: ./artifacts

      - name: List artifacts
        run: ls -la ./artifacts

      - name: Rename to mcpack for CurseForge
        run: |
          mv ./artifacts/bedrock-voice-chat-${{ needs.prepare-mods-release.outputs.new_release_version }}.zip \
             ./artifacts/bedrock-voice-chat-${{ needs.prepare-mods-release.outputs.new_release_version }}.mcpack

      - name: Publish to CurseForge
        uses: itsmeow/curseforge-upload@v3
        with:
          token: ${{ secrets.CURSEFORGE_API_TOKEN }}
          project_id: 1445992
          game_endpoint: minecraft
          file_path: ./artifacts/bedrock-voice-chat-${{ needs.prepare-mods-release.outputs.new_release_version }}.mcpack
          changelog: ${{ needs.prepare-mods-release.outputs.new_release_notes }}
          changelog_type: markdown
          display_name: Bedrock Voice Chat ${{ needs.prepare-mods-release.outputs.new_release_version }}
          game_versions: Bedrock
          release_type: ${{ github.ref_name == 'beta' && 'beta' || 'release' }}

  # Job 17: Upload mod artifacts to mods GitHub Release
  upload-mod-release-assets:
    name: Upload Mod Release Assets
    needs: [prepare-mods-release, build-mod-fabric, build-mod-paper, build-mod-hytale, build-mod-bds]
    if: always() && needs.prepare-mods-release.outputs.new_release_published == 'true' && (needs.build-mod-fabric.result == 'success' || needs.build-mod-paper.result == 'success' || needs.build-mod-hytale.result == 'success' || needs.build-mod-bds.result == 'success')
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download Fabric artifact
        if: needs.build-mod-fabric.result == 'success'
        uses: actions/download-artifact@v4
        with:
          name: bedrock-voice-chat-fabric-${{ needs.prepare-mods-release.outputs.new_release_version }}
          path: ./release-files

      - name: Download Paper artifact
        if: needs.build-mod-paper.result == 'success'
        uses: actions/download-artifact@v4
        with:
          name: bedrock-voice-chat-paper-${{ needs.prepare-mods-release.outputs.new_release_version }}
          path: ./release-files

      - name: Download Hytale artifact
        if: needs.build-mod-hytale.result == 'success'
        uses: actions/download-artifact@v4
        with:
          name: bedrock-voice-chat-hytale-${{ needs.prepare-mods-release.outputs.new_release_version }}
          path: ./release-files

      - name: Download BDS artifact
        if: needs.build-mod-bds.result == 'success'
        uses: actions/download-artifact@v4
        with:
          name: bedrock-voice-chat-bds-${{ needs.prepare-mods-release.outputs.new_release_version }}
          path: ./release-files

      - name: Rename artifacts
        run: |
          VERSION="${{ needs.prepare-mods-release.outputs.new_release_version }}"
          cd ./release-files

          # Rename to consistent naming
          if [ -f "bedrock-voice-chat-${VERSION}.jar" ]; then
            mv "bedrock-voice-chat-${VERSION}.jar" "bvc-fabric-mod-${VERSION}.jar"
          fi

          if [ -f "bedrock-voice-chat-paper-${VERSION}.jar" ]; then
            mv "bedrock-voice-chat-paper-${VERSION}.jar" "bvc-paper-plugin-${VERSION}.jar"
          fi

          if [ -f "bedrock-voice-chat-hytale-${VERSION}.jar" ]; then
            mv "bedrock-voice-chat-hytale-${VERSION}.jar" "bvc-hytale-plugin-${VERSION}.jar"
          fi

          if [ -f "bedrock-voice-chat-${VERSION}.zip" ]; then
            mv "bedrock-voice-chat-${VERSION}.zip" "bvc-bds-pack-${VERSION}.zip"
          fi

          echo "=== Release files ==="
          ls -la

      - name: Upload assets to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: mods-v${{ needs.prepare-mods-release.outputs.new_release_version }}
          files: |
            ./release-files/*.jar
            ./release-files/*.zip
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Release summary
        run: |
          VERSION="${{ needs.prepare-mods-release.outputs.new_release_version }}"
          {
            echo "## Mods Release Assets Uploaded"
            echo ""
            echo "Version: **mods-v${VERSION}**"
            echo ""
            echo "### Uploaded Files"
            echo ""
            for file in ./release-files/*; do
              if [ -f "$file" ]; then
                echo "- \`$(basename $file)\`"
              fi
            done
          } >> $GITHUB_STEP_SUMMARY

  # Post-approval: Deploy updater manifest to GitHub Pages
  deploy-updater-manifest:
    name: Deploy Updater Manifest
    needs: [prepare-release, approve-publish]
    if: needs.approve-publish.result == 'success'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          ref: ${{ needs.prepare-release.outputs.new_tag }}

      - name: Download Windows updater artifacts
        uses: actions/download-artifact@v4
        continue-on-error: true
        with:
          name: bvc-windows-updater
          path: ./artifacts/windows

      - name: Download macOS updater artifacts
        uses: actions/download-artifact@v4
        continue-on-error: true
        with:
          name: bvc-macos-updater
          path: ./artifacts/macos

      - name: Prepare sig files for script
        run: |
          mkdir -p release-files
          if [ -f "./artifacts/windows/bvc-windows-updater.nsis.zip.sig" ]; then
            cp "./artifacts/windows/bvc-windows-updater.nsis.zip.sig" "./release-files/bvc-client-windows-x64-updater.nsis.zip.sig"
          fi
          if [ -f "./artifacts/macos/bvc-macos-updater.app.tar.gz.sig" ]; then
            cp "./artifacts/macos/bvc-macos-updater.app.tar.gz.sig" "./release-files/bvc-client-macos-arm64-updater.app.tar.gz.sig"
          fi

      - name: Generate updater JSON
        env:
          RELEASE_FILES_DIR: ./release-files
        run: |
          VERSION="${{ needs.prepare-release.outputs.new_version }}"
          TAG="${{ needs.prepare-release.outputs.new_tag }}"
          REPO="${{ github.repository }}"
          IS_PRERELEASE="${{ contains(needs.prepare-release.outputs.new_version, '-') }}"

          mkdir -p updater-pages

          if [ "$IS_PRERELEASE" = "true" ]; then
            OUTPUT_PATH=updater-pages/beta.json node .github/scripts/generate-updater-json.js "$VERSION" "$REPO" "$TAG"
          else
            OUTPUT_PATH=updater-pages/latest.json node .github/scripts/generate-updater-json.js "$VERSION" "$REPO" "$TAG"
          fi

          echo "=== Generated updater JSON ==="
          cat updater-pages/*.json

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./updater-pages
          destination_dir: updater
          keep_files: true

      - name: Updater manifest summary
        run: |
          VERSION="${{ needs.prepare-release.outputs.new_version }}"
          IS_PRERELEASE="${{ contains(needs.prepare-release.outputs.new_version, '-') }}"
          if [ "$IS_PRERELEASE" = "true" ]; then
            FILENAME="beta.json"
          else
            FILENAME="latest.json"
          fi
          {
            echo "## Updater Manifest Deployed"
            echo ""
            echo "| Name | Value |"
            echo "| ---- | ----- |"
            echo "| Version | ${VERSION} |"
            echo "| Manifest | [\`${FILENAME}\`](https://${{ github.repository_owner }}.github.io/${{ github.event.repository.name }}/updater/${FILENAME}) |"
            echo "| Channel | $([ "$IS_PRERELEASE" = "true" ] && echo "prerelease" || echo "stable") |"
          } >> $GITHUB_STEP_SUMMARY

  # Post-approval: Deploy versioned AsyncAPI docs to GitHub Pages
  deploy-docs:
    name: Deploy WebSocket Docs (v${{ needs.prepare-release.outputs.new_version }})
    needs: [prepare-release, build-client, approve-publish]
    if: needs.approve-publish.result == 'success'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download AsyncAPI YAML
        uses: actions/download-artifact@v4
        with:
          name: asyncapi-yaml
          path: docs

      - name: Generate HTML from AsyncAPI spec
        run: npx -y @asyncapi/generator@2 docs/websocket-api.yaml @asyncapi/html-template -o docs/websocket-api-html --force-write -p singleFile=true

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./docs/websocket-api-html
          destination_dir: websocket/${{ needs.prepare-release.outputs.new_version }}
          keep_files: true

      - name: Documentation deployed
        run: echo "WebSocket docs deployed to https://${{ github.repository_owner }}.github.io/${{ github.event.repository.name }}/websocket/${{ needs.prepare-release.outputs.new_version }}"

  # Post-approval: Update version on GitHub Pages landing page (beta only for now)
  update-gh-pages-version:
    name: Update GitHub Pages Version
    needs: [prepare-release, approve-publish]
    if: needs.approve-publish.result == 'success' && contains(needs.prepare-release.outputs.new_version, '-beta')
    runs-on: ubuntu-latest
    steps:
      - name: Generate GitHub App token
        id: generate-token
        uses: actions/create-github-app-token@v1
        with:
          app-id: ${{ secrets.APP_ID }}
          private-key: ${{ secrets.APP_PRIVATE_KEY }}

      - name: Checkout gh-pages branch
        uses: actions/checkout@v4
        with:
          ref: gh-pages
          token: ${{ steps.generate-token.outputs.token }}

      - name: Update version in index.js
        run: |
          VERSION="${{ needs.prepare-release.outputs.new_version }}"
          sed -i "s|const BVC_VERSION = \".*\"|const BVC_VERSION = \"${VERSION}\"|" index.js
          sed -i "s|const BVC_MODS_VERSION = \".*\"|const BVC_MODS_VERSION = \"mods-v${VERSION}\"|" index.js
          echo "Updated index.js:"
          head -3 index.js

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add index.js
          git diff --staged --quiet || git commit -m "chore: update version to ${{ needs.prepare-release.outputs.new_version }}"
          git push

  # Post-approval: Build and push Docker image
  publish-docker:
    name: Publish Docker Image
    needs: [prepare-release, build-server, approve-publish]
    if: needs.approve-publish.result == 'success'
    uses: ./.github/workflows/build-server-docker.yml
    with:
      version: ${{ needs.prepare-release.outputs.new_version }}
      ref: ${{ needs.prepare-release.outputs.new_tag }}
      build_mode: release
      push: true
    secrets: inherit
