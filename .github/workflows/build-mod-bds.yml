name: Build BDS Pack

on:
  workflow_call:
    inputs:
      version:
        description: 'Version to build (overrides package.json)'
        required: false
        type: string
      ref:
        description: 'Git ref to checkout (tag, branch, or SHA)'
        required: false
        type: string
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build-bds-pack:
    name: Build BDS Addon Pack
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          ref: ${{ inputs.ref || github.ref }}

      - name: Patch version files
        if: inputs.version != ''
        run: |
          node .github/scripts/patch-mod-versions.js "${{ inputs.version }}"

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Enable Corepack for Yarn
        run: corepack enable

      - name: Cache dependencies
        uses: actions/cache@v4
        with:
          path: |
            mods/bds/node_modules
            ~/.yarn/berry/cache
          key: ${{ runner.os }}-bds-${{ hashFiles('mods/bds/yarn.lock') }}
          restore-keys: |
            ${{ runner.os }}-bds-

      - name: Install dependencies
        working-directory: ./mods/bds
        run: yarn install --immutable

      - name: Get pack version
        id: pack-version
        working-directory: ./mods/bds
        run: |
          if [ -n "${{ inputs.version }}" ]; then
            VERSION="${{ inputs.version }}"
          else
            VERSION=$(node -p "require('./package.json').version")
          fi
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "Pack version: $VERSION"

      - name: Update manifest versions
        working-directory: ./mods/bds
        run: |
          VERSION="${{ steps.pack-version.outputs.version }}"
          ENCODED=$(node ../../.github/scripts/encode-version.js "$VERSION")
          echo "Encoded version: $ENCODED"

          # Parse encoded version into array components
          IFS='.' read -r MAJOR MINOR PATCH <<< "$ENCODED"

          # Update both BP and RP manifests
          node -e "
            const fs = require('fs');
            const major = $MAJOR, minor = $MINOR, patch = $PATCH;
            const ver = [major, minor, patch];

            for (const file of ['bp/manifest.json', 'rp/manifest.json']) {
              const manifest = JSON.parse(fs.readFileSync(file, 'utf8'));

              // Update header version
              manifest.header.version = ver;

              // Update all module versions
              for (const mod of manifest.modules) {
                mod.version = ver;
              }

              // Update UUID-based dependency versions (cross-references between BP/RP)
              for (const dep of manifest.dependencies || []) {
                if (dep.uuid) {
                  dep.version = ver;
                }
              }

              fs.writeFileSync(file, JSON.stringify(manifest, null, 2) + '\n');
              console.log('Updated ' + file + ' -> [' + ver.join(', ') + ']');
            }
          "

      - name: Bundle zips
        working-directory: ./mods/bds
        run: yarn run pack

      - name: Verify zip creation
        shell: bash
        run: |
          cd mods/bds
          BP_ZIP="bedrock-voice-chat-bp.zip"
          RP_ZIP="bedrock-voice-chat-rp.zip"

          if [ ! -f "$BP_ZIP" ]; then
            echo "No BP zip found!"
            exit 1
          fi
          if [ ! -f "$RP_ZIP" ]; then
            echo "No RP zip found!"
            exit 1
          fi

          echo "Found BP zip:"
          ls -lh "$BP_ZIP"
          echo "Found RP zip:"
          ls -lh "$RP_ZIP"

          VERSION="${{ steps.pack-version.outputs.version }}"
          cp "$BP_ZIP" "../../bedrock-voice-chat-bp-${VERSION}.zip"
          cp "$RP_ZIP" "../../bedrock-voice-chat-rp-${VERSION}.zip"

          echo "Prepared artifacts:"
          echo "  bedrock-voice-chat-bp-${VERSION}.zip"
          echo "  bedrock-voice-chat-rp-${VERSION}.zip"

      - name: Upload BP artifact
        uses: actions/upload-artifact@v4
        with:
          name: bedrock-voice-chat-bds-bp-${{ steps.pack-version.outputs.version }}.zip
          path: bedrock-voice-chat-bp-${{ steps.pack-version.outputs.version }}.zip
          retention-days: 30

      - name: Upload RP artifact
        uses: actions/upload-artifact@v4
        with:
          name: bedrock-voice-chat-bds-rp-${{ steps.pack-version.outputs.version }}.zip
          path: bedrock-voice-chat-rp-${{ steps.pack-version.outputs.version }}.zip
          retention-days: 30

      - name: Output artifact information
        shell: bash
        run: |
          {
            echo "## BDS Pack Build Complete"
            echo ""
            echo "| Name | Value |"
            echo "| ---- | ----- |"
            echo "| Version | ${{ steps.pack-version.outputs.version }} |"
            echo "| Trigger | ${{ github.event_name }} |"
            echo "| BP Artifact | bedrock-voice-chat-bds-bp-${{ steps.pack-version.outputs.version }}.zip |"
            echo "| RP Artifact | bedrock-voice-chat-bds-rp-${{ steps.pack-version.outputs.version }}.zip |"
            echo "| Artifact URL | [View Run](${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}/actions/runs/${GITHUB_RUN_ID}) |"
            echo "| Retention | 30 days |"
          } >> $GITHUB_STEP_SUMMARY
