[package]
name = "bedrock-voice-chat"
version = "0.1.0"
edition = "2021"

# See more keys and their definitions at https://doc.rust-lang.org/cargo/reference/manifest.html

[dependencies]
cpal = { git = "https://github.com/RustAudio/cpal.git", features = ["asio"] }
tokio = { version = "^1.32", features = ["full"] }
clap = { version = "^4.0", features = ["derive", "env", "wrap_help"] }
anyhow = { version ="^1.0" }
reqwest = { version ="^0.11", features = ["json", "rustls"] }
serde = { version ="^1.0", features = ["derive"] }
serde_json = { version ="^1.0" }
thiserror = { version ="^1.0" }
ringbuf = { version ="^0.3" }
ron = { version ="^0.8" }
zstd = { version = "^0.12", features = ["bindgen"] }
nnnoiseless = { version = "^0.5" }
audiopus = { version = "^0.2", features = ["default_features", "multistream"] }
opus = { version = "^0.3" }
