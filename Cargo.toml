[package]
name = "bedrock-voice-chat"
version = "0.1.0"
edition = "2021"

# See more keys and their definitions at https://doc.rust-lang.org/cargo/reference/manifest.html

[dependencies]
cpal = { git = "https://github.com/RustAudio/cpal.git", features = ["asio"] }
tokio = { version = "^1.32", features = ["full"] }
clap = { version = "^4.0", features = ["derive", "env", "wrap_help"] }
anyhow = { version ="^1.0" }
reqwest = { version = "0.11.13", features = ["json", "rustls"] }
serde = { version = "1.0.152", features = ["derive"] }
serde_json = "1.0.91"
thiserror = "1.0.38"
ringbuf = "0.3.3"
opus = "0.3.0"
ron = "0.8.1"
zstd = { version = "0.12.4", features = ["bindgen"] }
